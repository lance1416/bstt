[project]
name = "stt"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "faster-whisper",
    "opencc-python-reimplemented",
]

[project.optional-dependencies]
punctuation = ["funasr"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=9.1.0",
]

# Install punctuation support separately once a funasr wheel is available for your Python version:
#   uv add funasr
# or pin to a Python version that has pre-built wheels (3.12 / 3.13).
