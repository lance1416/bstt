[model]
# Whisper model size: tiny | base | small | medium | large-v2 | large-v3
size = "large-v3"

# Inference device: "auto" picks CUDA if available, falls back to CPU
# Options: auto | cuda | cpu
device = "auto"

# Numeric precision for inference
# "auto" = float16 on CUDA, int8 on CPU
# Options: auto | float16 | int8_float16 | int8 | float32
compute_type = "auto"

# BCP-47 language code fed to Whisper
# "yue" = Cantonese; "zh" = Mandarin
language = "yue"

# Voice Activity Detection — strips silent regions before transcription
vad_filter = true

# Beam search width; higher = more accurate but slower
beam_size = 5
